databaseChangeLog:
  - changeSet:
      id: 1
      author: Joe Sharp
      labels: init
      comment: Create initial SDQ table
      changes:
        - createTable:
            tableName: sdq
            columns:
              - column:
                  name: period_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: assessor
                  type: TEXT
              - column:
                  name: statement
                  type: TEXT
              - column:
                  name: score
                  type: INT

        # Composite primary key
        - addPrimaryKey:
            tableName: sdq
            columnNames: period_id, assessor, statement
            constraintName: pk_sdq

        - addForeignKeyConstraint:
            baseTableName: sdq
            baseColumnNames: statement
            referencedTableName: sdq_statement
            referencedColumnNames: statement_key
            constraintName: fk_sdq_statement

        # Foreign key to reporting_period(period_id)
        - addForeignKeyConstraint:
            baseTableName: sdq
            baseColumnNames: period_id
            referencedTableName: reporting_period
            referencedColumnNames: period_id
            constraintName: fk_sdq_reporting_period
            onDelete: CASCADE
