databaseChangeLog:
  - changeSet:
      id: 1
      author: Joe Sharp
      labels: init
      comment: Create initial Reporting Period table
      changes:
        - createTable:
            tableName: reporting_period
            columns:
              - column:
                  name: period_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: period_date
                  type: DATE

        # Foreign key to client(client_id)
        - addForeignKeyConstraint:
            baseTableName: reporting_period
            baseColumnNames: client_id
            referencedTableName: client
            referencedColumnNames: client_id
            constraintName: fk_client_reporting_period
            onDelete: CASCADE
