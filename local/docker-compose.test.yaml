name: sdq-test
services:

  sdq-test-db:
    image: postgres:17
    container_name: sdq-test-db
    networks:
      - sdq-test
    environment:
      POSTGRES_USER: ${SDQ_TEST_DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${SDQ_TEST_DATABASE_PASSWORD}
      POSTGRES_DB: ${SDQ_TEST_DATABASE_NAME}
    ports:
      - "5435:5432"
    volumes:
      - sdq_test_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U test -d sdq
      interval: 10s
      timeout: 3s
      retries: 3

  sdq-test-db-migration:
    build:
      context: ../sdq-database
    image: sdq-db-migration
    container_name: sdq-test-db-migration
    networks:
      - sdq-test
    environment:
      LIQUIBASE_DRIVER: org.postgresql.Driver
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://sdq-test-db:5435/${SDQ_TEST_DATABASE_NAME}
      LIQUIBASE_COMMAND_USERNAME: ${SDQ_TEST_DATABASE_USERNAME}
      LIQUIBASE_COMMAND_PASSWORD: ${SDQ_TEST_DATABASE_PASSWORD}
    depends_on:
      sdq-test-db:
        condition: service_healthy

networks:
  sdq-test:
    driver: bridge

volumes:
  sdq_test_data:
