spring:
  application:
    name: sdq-analysis
  security.oauth2.client:
    registration:
      keycloak:
        client-id: ${CLIENT_ID}
        client-secret: ${CLIENT_SECRET}
        scope: openid, profile, email
        authorization-grant-type: authorization_code
        redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
    provider:
      keycloak:
        issuer-uri: ${OAUTH2_ISSUER_URI}

database:
  url: default
  username: default
  password: default