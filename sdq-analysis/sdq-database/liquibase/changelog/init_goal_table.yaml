databaseChangeLog:
  - changeSet:
      id: 1
      author: Joe Sharp
      labels: init
      comment: Create initial Goal table
      changes:
        - createTable:
            tableName: goal
            columns:
              - column:
                  name: goal_id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: client_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT

        # Foreign key to client(client_id)
        - addForeignKeyConstraint:
            baseTableName: goal
            baseColumnNames: client_id
            referencedTableName: client
            referencedColumnNames: client_id
            constraintName: fk_client_goal
            onDelete: CASCADE
