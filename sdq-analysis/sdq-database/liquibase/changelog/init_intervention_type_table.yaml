databaseChangeLog:
  - changeSet:
      id: 1
      author: Joe Sharp
      labels: init
      comment: Create initial Intervention Type table
      changes:
        - createTable:
            tableName: intervention_type
            columns:
              - column:
                  name: client_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: intervention_type
                  type: TEXT
                  constraints:
                    nullable: false

        # Foreign key to client(client_id)
        - addForeignKeyConstraint:
            baseTableName: intervention_type
            baseColumnNames: client_id
            referencedTableName: client
            referencedColumnNames: client_id
            constraintName: fk_client_intervention_type
            onDelete: CASCADE
