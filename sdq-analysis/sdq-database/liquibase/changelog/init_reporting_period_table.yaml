databaseChangeLog:
  - changeSet:
      id: 1
      author: Joe Sharp
      labels: init
      comment: Create initial Reporting Period table
      changes:
        - createTable:
            tableName: reporting_period
            columns:
              - column:
                  name: client_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: period_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: period_date
                  type: DATE
